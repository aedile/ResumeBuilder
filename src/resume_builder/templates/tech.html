{% extends "base.html" %}

{# Tech style - color sidebar, modern, tech-forward #}

{% block styles %}
{{ super() }}
<style>
    /* Tech Style Overrides */
    :root {
        --color-primary: #0066cc;
        --color-secondary: #0052a3;
        --color-accent: #00aaff;
        --color-text: #1a1a1a;
        --color-text-muted: #666666;
        --color-border: #e0e0e0;
        --color-sidebar-bg: #f8f9fa;
        --font-family-sans: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
        max-width: 60rem;
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 2rem;
        padding: 2rem;
    }

    header {
        grid-column: 1 / -1;
        border-bottom: 2px solid var(--color-primary);
        background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-accent) 100%);
        color: white;
        padding: 2rem;
        margin: -2rem -2rem 2rem -2rem;
    }

    h1 {
        color: white;
        font-size: 2.5rem;
        font-weight: 700;
    }

    .headline {
        color: rgba(255, 255, 255, 0.95);
        font-size: 1.2rem;
    }

    h2 {
        color: var(--color-primary);
        font-weight: 600;
        border-bottom: 2px solid var(--color-primary);
    }

    /* Sidebar for skills */
    main {
        grid-column: 2;
    }

    .item-title {
        color: var(--color-primary);
        font-weight: 600;
    }

    @media print {
        body {
            grid-template-columns: 1fr;
        }

        header {
            background: none;
            color: var(--color-text);
            border-bottom-color: var(--color-border);
        }

        h1,
        .headline {
            color: var(--color-text);
        }
    }
</style>
{% endblock %}
